name: نشر مستشار ناف على Cloudflare

# نشر ذاتي التجهيز: يُنشئ موارد Cloudflare إن لم تكن موجودة، يحقن معرّفاتها في
# wrangler.toml، يطبّق الترحيلات، ثم ينشر — دون أي عمل من الطرفية.
#
# المطلوب مرّة واحدة: أضِف في GitHub › Settings › Secrets and variables › Actions
#   CLOUDFLARE_API_TOKEN   — رمز بصلاحيات: Workers Scripts, D1, KV, R2, Queues, Vectorize (Edit)
#   CLOUDFLARE_ACCOUNT_ID  — معرّف حسابك في Cloudflare
# أما سرّا التطبيق (ANTHROPIC_API_KEY و JWT_SECRET) فتُضافان بعد أول نشر من لوحة
# Cloudflare (Workers › الإعداد › Variables and Secrets) لتبقى داخل Cloudflare فقط.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: تثبيت الاعتماديات
        run: |
          npm ci
          npm --prefix web ci

      - name: بناء الواجهة
        run: npm run build:web

      - name: تجهيز موارد Cloudflare (idempotent)
        run: |
          set +e
          npx wrangler d1 create naf_legal
          npx wrangler r2 bucket create naf-legal-files
          npx wrangler kv namespace create KV
          # فهارس Vectorize اختيارية (تتطلّب صلاحية Vectorize في الرمز):
          npx wrangler vectorize create naf-legal-kb   --dimensions=1024 --metric=cosine
          npx wrangler vectorize create naf-legal-conv --dimensions=1024 --metric=cosine
          true

      - name: حقن المعرّفات في wrangler.toml
        run: |
          set -euo pipefail
          D1_ID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="naf_legal") | .uuid' | head -1)
          KV_ID=$(npx wrangler kv namespace list | jq -r '.[] | select(.title|endswith("KV")) | .id' | head -1)
          if [ -z "$D1_ID" ] || [ -z "$KV_ID" ]; then
            echo "تعذّر الحصول على معرّفات D1/KV — تحقّق من صلاحيات الرمز." >&2
            exit 1
          fi
          sed -i "s/REPLACE_WITH_D1_ID/$D1_ID/" wrangler.toml
          sed -i "s/REPLACE_WITH_KV_ID/$KV_ID/" wrangler.toml
          echo "D1=$D1_ID  KV=$KV_ID"

      - name: تطبيق ترحيلات قاعدة البيانات
        run: npx wrangler d1 migrations apply naf_legal --remote

      - name: النشر
        run: npx wrangler deploy
