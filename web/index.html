<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#232a3d" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <title>مستشار ناف — منصة الاستشارات القانونية الذكية</title>
    <script>
      // ضبط السمة مبكرًا لتفادي الوميض
      (function () {
        try {
          var saved = localStorage.getItem('naf-theme');
          var theme = saved || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
